<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio - Contact</title>
    <link rel="stylesheet" href="styles/contact.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">Mon<span>Portfolio</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="about.html">À propos</a></li>
                <li><a href="skills.html">Compétences</a></li>
                <li><a href="projects.html">Projets</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="section-contact">
            <h2>Parlons de votre projet</h2>
            <form method="get" action="">
                <div class="form-nom-email">
                    <div class="form-column">
                        <label for="nom">Nom(s) & Prénom(s)</label>
                        <input type="text" name="nom" id="nom" required>
                    </div>
                    <div class="form-column">
                        <label for="email">e-mail</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                </div>
                <label for="message">Message</label>
                <textarea name="message" id="message" rows="10" required></textarea>
                <input type="submit" value="ENVOYER" class="cta-button">
            </form>
        </section>
        <div class="contact-container">
            <h2>CONTACT INFO</h2>

            <!-- Section Mail -->
            <div class="info-item">
                <div class="icon-box"><i class="icon-mail"><img height="25px" src="images/Email.png"
                            alt="Image Email"></i></div>
                <div class="text-content">
                    <span class="label">E-mail Adresse</span>
                    <p>georgesemmanuelle69@gmail.com</p>
                </div>
            </div>

            <!-- Section Téléphone -->
            <div class="info-item">
                <div class="icon-box"><i class="icon-phone"><img height="35px" src="images/phone.png"
                            alt="Image Telephone"></i></div>
                <div class="text-content">
                    <span class="label">CONTACT</span>
                    <p class="num">+237 699 213 612</p>
                    <p class="num">+221 78 791 74 92</p>
                </div>
            </div>

            <!-- Section Localisation -->
            <div class="info-item">
                <div class="icon-box"><i class="icon-location"><img height="35px" src="images/localisation.png"
                            alt="Image Localisation"></i></div>
                <div class="text-content">
                    <span class="label">LOCALISATION</span>
                    <address>
                        Rue Eni, 595
                    </address>
                </div>
            </div>

            <h2>SOCIAL INFO</h2>
            <div class="social-icons">
                <div class="social-box">
                    <a target="_blank" href="#" class="icon-twitter">
                        <img height="35px" src="images/X Logo.png" alt="Logo X">
                    </a>
                </div>
                <div class="social-box">
                    <a target="_blank" href="#" class="icon-instagram">
                        <img height="35px" src="images/IG Logo.png" alt="Logo Instagram">
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 MonPortfolio - Georges Emmanuelle</p>
            <div class="social-links">
                <a href="https://github.com/georgesemmanuelle/Training.git">GitHub</a>
            </div>
        </div>
    </footer>
</body>

</html>
